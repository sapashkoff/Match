<!DOCTYPE html>
<html lang="ru" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Учёт сменной работы</title>

    <!-- PWA для iPhone -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WorkLog">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">

    <!-- Bootstrap 5 + Иконки -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>
        body {
            background: linear-gradient(135deg, #1a1c2e 0%, #2d1b3a 100%);
            min-height: 100vh;
            padding: 2rem 0;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        .app-container {
            max-width: 960px;
            margin: 0 auto;
        }
        .card {
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.5rem;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s ease, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.2);
        }
        .card-header {
            border-radius: 1.5rem 1.5rem 0 0 !important;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-weight: 600;
            letter-spacing: 0.5px;
            border-bottom: none;
        }
        .form-label {
            font-weight: 500;
            color: #ced4da;
            margin-bottom: 0.3rem;
        }
        .form-control, .form-select {
            border-radius: 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.6rem 1rem;
            background-color: rgba(255, 255, 255, 0.05);
            color: #eaeaea;
            transition: all 0.2s;
        }
        .form-control:focus, .form-select:focus {
            border-color: #764ba2;
            box-shadow: 0 0 0 0.2rem rgba(118, 75, 162, 0.3);
            background-color: rgba(255, 255, 255, 0.08);
            color: #fff;
        }
        .input-group-text {
            border-radius: 0.75rem 0 0 0.75rem;
            background-color: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            color: #adb5bd;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 2rem;
            padding: 0.6rem 2rem;
            font-weight: 500;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
            transition: all 0.2s;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(102, 126, 234, 0.6);
        }
        .btn-outline-secondary, .btn-outline-danger {
            border-radius: 2rem;
        }
        .table {
            border-radius: 0.75rem;
            overflow: hidden;
            margin-bottom: 0;
        }
        .table thead th {
            border-bottom: none;
            font-weight: 500;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            background: rgba(0,0,0,0.25);
            color: #adb5bd;
        }
        .table tbody tr {
            transition: background 0.15s;
            animation: fadeRow 0.3s ease;
        }
        .table tbody tr:hover {
            background-color: rgba(102, 126, 234, 0.1) !important;
        }
        @keyframes fadeRow {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .delete-btn {
            background: none;
            border: none;
            color: #dc3545;
            font-size: 1.3rem;
            cursor: pointer;
            transition: 0.15s;
            padding: 0 4px;
        }
        .delete-btn:hover {
            color: #ff6b7a;
            transform: scale(1.2);
        }
        .total-box {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(15px);
            border-radius: 1.5rem;
            padding: 1rem 1.8rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            margin-top: 1.5rem;
        }
        .total-amount {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #ca8bfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .filter-card .card-header {
            background: rgba(255,255,255,0.06);
            color: #ced4da;
            font-weight: 500;
        }
        @media (max-width: 576px) {
            .btn-primary { width: 100%; }
            .total-box { flex-direction: column; gap: 0.5rem; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <h1 class="text-center mb-4 fw-bold">
            <i class="bi bi-journal-check me-2"></i>Учёт выполненных работ
        </h1>

        <!-- Форма -->
        <div class="card mb-4">
            <div class="card-body p-4">
                <form id="workForm">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label for="date" class="form-label"><i class="bi bi-calendar3 me-1"></i>Дата</label>
                            <input type="date" class="form-control" id="date" required>
                        </div>
                        <div class="col-md-4">
                            <label for="workName" class="form-label"><i class="bi bi-tools me-1"></i>Название работы</label>
                            <input type="text" class="form-control" id="workName" placeholder="Введите название" required>
                        </div>
                        <div class="col-md-4">
                            <label for="shiftType" class="form-label"><i class="bi bi-clock-history me-1"></i>Тип смены</label>
                            <select class="form-select" id="shiftType" required>
                                <option value="">-- Выберите смену --</option>
                                <option value="6">6-часовая</option>
                                <option value="6+">6+ часов</option>
                                <option value="8">8-часовая</option>
                                <option value="10+">10+ часов</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label for="rateInput" class="form-label"><i class="bi bi-cash-coin me-1"></i>Сумма за смену</label>
                            <div class="input-group">
                                <input type="number" class="form-control" id="rateInput" min="0" step="1" readonly>
                                <span class="input-group-text">₽</span>
                            </div>
                        </div>
                        <div class="col-md-3 d-flex align-items-end">
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-plus-lg me-2"></i>Добавить запись
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- Фильтрация с навигацией по периодам -->
        <div class="card mb-4 filter-card">
            <div class="card-header py-2">
                <h6 class="mb-0"><i class="bi bi-funnel me-2"></i>Фильтрация записей</h6>
            </div>
            <div class="card-body">
                <div class="row g-2 align-items-end">
                    <div class="col-md-2">
                        <label for="filterStartDate" class="form-label">С даты</label>
                        <input type="date" class="form-control" id="filterStartDate">
                    </div>
                    <div class="col-md-2">
                        <label for="filterEndDate" class="form-label">По дату</label>
                        <input type="date" class="form-control" id="filterEndDate">
                    </div>
                    <div class="col-md-2">
                        <div class="btn-group w-100" role="group">
                            <button type="button" class="btn btn-outline-secondary" id="prevPeriodBtn" title="Предыдущий период">
                                <i class="bi bi-chevron-left"></i>
                            </button>
                            <button type="button" class="btn btn-outline-secondary" id="resetFilterBtn" title="Текущий расчётный период">
                                <i class="bi bi-arrow-counterclockwise"></i>
                            </button>
                            <button type="button" class="btn btn-outline-secondary" id="nextPeriodBtn" title="Следующий период">
                                <i class="bi bi-chevron-right"></i>
                            </button>
                        </div>
                    </div>
                    <div class="col-md-2">
                        <button type="button" class="btn btn-primary w-100" id="filterBtn"><i class="bi bi-check2 me-1"></i>Применить</button>
                    </div>
                    <div class="col-md-2">
                        <button type="button" class="btn btn-outline-danger w-100" id="showAllBtn"><i class="bi bi-list-ul me-1"></i>Все записи</button>
                    </div>
                    <div class="col-md-2">
                        <span class="text-muted small" id="filterInfo"></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Таблица -->
        <div class="card mb-4">
            <div class="card-header py-3">
                <h5 class="mb-0"><i class="bi bi-list-ul me-2"></i>Все записи</h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped table-hover mb-0">
                        <thead>
                            <tr>
                                <th class="ps-4">Дата</th>
                                <th>Работа</th>
                                <th class="text-center">Смена</th>
                                <th class="text-end">Сумма</th>
                                <th class="text-center pe-4">Действие</th>
                            </tr>
                        </thead>
                        <tbody id="workTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Итоговая сумма -->
        <div class="total-box">
            <div class="d-flex align-items-center">
                <i class="bi bi-wallet2 fs-2 me-3" style="color: #adb5bd;"></i>
                <div>
                    <div class="text-muted small">ОБЩАЯ СУММА</div>
                    <div class="total-amount" id="grandTotal">0 ₽</div>
                </div>
            </div>
            <button class="btn btn-outline-danger" id="clearAllBtn">
                <i class="bi bi-trash3 me-2"></i>Очистить всё
            </button>
        </div>
    </div>

    <script>
        (function() {
            // Ставки
            const shiftRates = {
                "6": 7830,
                "6+": 8613,
                "8": 10005,
                "10+": 12180
            };

            // Данные
            let works = JSON.parse(localStorage.getItem('works')) || [];
            // Активный фильтр (null = показываем всё)
            let activeFilter = null;
            // Текущий отображаемый период (для навигации стрелками) – объект {start, end}
            let currentPeriod = null;

            // DOM элементы
            const dateInput = document.getElementById('date');
            const workNameInput = document.getElementById('workName');
            const shiftTypeSelect = document.getElementById('shiftType');
            const rateInput = document.getElementById('rateInput');
            const workForm = document.getElementById('workForm');
            const tableBody = document.getElementById('workTableBody');
            const grandTotalSpan = document.getElementById('grandTotal');
            const filterStartDate = document.getElementById('filterStartDate');
            const filterEndDate = document.getElementById('filterEndDate');
            const filterBtn = document.getElementById('filterBtn');
            const resetFilterBtn = document.getElementById('resetFilterBtn');
            const filterInfo = document.getElementById('filterInfo');
            const clearAllBtn = document.getElementById('clearAllBtn');
            const prevPeriodBtn = document.getElementById('prevPeriodBtn');
            const nextPeriodBtn = document.getElementById('nextPeriodBtn');
            const showAllBtn = document.getElementById('showAllBtn');

            // Установка даты по умолчанию
            dateInput.valueAsDate = new Date();

            // Обновление ставки
            shiftTypeSelect.addEventListener('change', () => {
                const val = shiftTypeSelect.value;
                rateInput.value = (val && shiftRates[val]) ? shiftRates[val] : '';
            });

            // Сохранение
            function save() {
                localStorage.setItem('works', JSON.stringify(works));
            }

            // Форматирование суммы
            function formatCurrency(amount) {
                return new Intl.NumberFormat('ru-RU').format(amount) + ' ₽';
            }

            // Вычисление расчётного периода по умолчанию (21 прошлого месяца – 20 текущего)
            function getDefaultPeriod() {
                const today = new Date();
                const day = today.getDate();
                const month = today.getMonth(); // 0-11
                const year = today.getFullYear();

                if (day >= 21) {
                    // Период: 21 текущего месяца – 20 следующего
                    return {
                        start: new Date(year, month, 21),
                        end: new Date(year, month + 1, 20)
                    };
                } else {
                    // Период: 21 прошлого месяца – 20 текущего
                    return {
                        start: new Date(year, month - 1, 21),
                        end: new Date(year, month, 20)
                    };
                }
            }

            // Сдвиг периода строго на один месяц (21 число – 20 число)
            function shiftPeriod(period, direction) {
                const newStart = new Date(period.start);
                const newEnd = new Date(period.end);
                const monthsDelta = direction === 'prev' ? -1 : 1;
                newStart.setMonth(newStart.getMonth() + monthsDelta);
                newEnd.setMonth(newEnd.getMonth() + monthsDelta);
                // setMonth корректно обрабатывает переход года
                return { start: newStart, end: newEnd };
            }

            // Запись дат из объекта периода в поля ввода
            function setDateFields(period) {
                const toInput = (date) => {
                    const y = date.getFullYear();
                    const m = String(date.getMonth() + 1).padStart(2, '0');
                    const d = String(date.getDate()).padStart(2, '0');
                    return `${y}-${m}-${d}`;
                };
                filterStartDate.value = toInput(period.start);
                filterEndDate.value = toInput(period.end);
            }

            // Обновление activeFilter из currentPeriod (если он не null)
            function applyPeriod(period) {
                currentPeriod = period;
                activeFilter = { start: new Date(period.start), end: new Date(period.end) };
                activeFilter.start.setHours(0,0,0,0);
                activeFilter.end.setHours(23,59,59,999);
                setDateFields(period);
                updateFilterInfo();
                render();
            }

            // Применить текущий расчётный период
            function applyCurrentPeriod() {
                const period = getDefaultPeriod();
                applyPeriod(period);
            }

            // Переход на соседний период
            function goToPeriod(direction) {
                // Если currentPeriod не задан (например, после ручного фильтра), начинаем с дефолтного
                const basePeriod = currentPeriod || getDefaultPeriod();
                const newPeriod = shiftPeriod(basePeriod, direction);
                applyPeriod(newPeriod);
            }

            // Показать все записи (сбросить фильтр)
            function showAll() {
                filterStartDate.value = '';
                filterEndDate.value = '';
                activeFilter = null;
                currentPeriod = null;
                filterInfo.textContent = 'Показаны все записи';
                render();
            }

            // Применить фильтр из полей ввода (ручной ввод дат)
            function applyFilterFromFields() {
                const startVal = filterStartDate.value;
                const endVal = filterEndDate.value;
                const start = startVal ? new Date(startVal) : null;
                const end = endVal ? new Date(endVal) : null;
                if (start) start.setHours(0,0,0,0);
                if (end) end.setHours(23,59,59,999);

                if (start || end) {
                    activeFilter = { start, end };
                    // Сбрасываем currentPeriod, так как фильтр теперь ручной
                    currentPeriod = null;
                } else {
                    activeFilter = null;
                    currentPeriod = null;
                }
                updateFilterInfo();
                render();
            }

            // Обновление текста информации о фильтре
            function updateFilterInfo() {
                if (!activeFilter) {
                    filterInfo.textContent = currentPeriod ? formatPeriod(currentPeriod) : 'Показаны все записи';
                    return;
                }
                const { start, end } = activeFilter;
                if (start && end) {
                    filterInfo.textContent = `${start.toLocaleDateString('ru')} – ${end.toLocaleDateString('ru')}`;
                } else if (start) {
                    filterInfo.textContent = `С ${start.toLocaleDateString('ru')}`;
                } else if (end) {
                    filterInfo.textContent = `До ${end.toLocaleDateString('ru')}`;
                } else {
                    filterInfo.textContent = '';
                }
            }

            function formatPeriod(period) {
                return `${period.start.toLocaleDateString('ru')} – ${period.end.toLocaleDateString('ru')}`;
            }

            // Фильтрация данных
            function getFilteredWorks() {
                if (!activeFilter) return works;
                const { start, end } = activeFilter;
                return works.filter(work => {
                    const d = new Date(work.date);
                    d.setHours(0,0,0,0);
                    if (start && d < start) return false;
                    if (end && d > end) return false;
                    return true;
                });
            }

            // Рендер таблицы
            function render() {
                const data = getFilteredWorks();
                const sorted = [...data].sort((a, b) => new Date(b.date) - new Date(a.date));
                tableBody.innerHTML = '';
                let total = 0;

                sorted.forEach(work => {
                    total += work.rate;
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td class="ps-4">${work.date}</td>
                        <td>${work.workName}</td>
                        <td class="text-center">${work.shiftType}</td>
                        <td class="text-end">${formatCurrency(work.rate)}</td>
                        <td class="text-center pe-4">
                            <button class="delete-btn" data-id="${work.id}" title="Удалить запись">
                                <i class="bi bi-trash3-fill"></i>
                            </button>
                        </td>
                    `;
                    tableBody.appendChild(row);
                });

                grandTotalSpan.textContent = formatCurrency(total);
            }

            // Добавление записи
            workForm.addEventListener('submit', (e) => {
                e.preventDefault();

                const date = dateInput.value;
                const workName = workNameInput.value.trim();
                const shiftType = shiftTypeSelect.value;
                const rate = parseFloat(rateInput.value);

                if (!date || !workName || !shiftType || isNaN(rate)) {
                    alert('Заполните все поля корректно.');
                    return;
                }

                works.push({
                    id: Date.now().toString(36) + Math.random().toString(36).substring(2, 7),
                    date,
                    workName,
                    shiftType,
                    rate
                });

                save();
                render();

                // Сброс формы
                workForm.reset();
                rateInput.value = '';
                shiftTypeSelect.value = '';
                dateInput.valueAsDate = new Date();
                workNameInput.focus();
            });

            // Удаление записи
            tableBody.addEventListener('click', (e) => {
                const btn = e.target.closest('.delete-btn');
                if (!btn) return;
                const id = btn.dataset.id;
                if (!confirm('Удалить эту запись?')) return;

                works = works.filter(w => w.id !== id);
                save();
                render();
            });

            // Очистить всё
            clearAllBtn.addEventListener('click', () => {
                if (works.length === 0) return;
                if (confirm('Удалить абсолютно все записи?')) {
                    works = [];
                    save();
                    render();
                }
            });

            // Обработчики кнопок фильтра
            filterBtn.addEventListener('click', applyFilterFromFields);
            resetFilterBtn.addEventListener('click', applyCurrentPeriod);
            prevPeriodBtn.addEventListener('click', () => goToPeriod('prev'));
            nextPeriodBtn.addEventListener('click', () => goToPeriod('next'));
            showAllBtn.addEventListener('click', showAll);

            // При загрузке автоматически показать расчётный период
            applyCurrentPeriod();
        })();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
